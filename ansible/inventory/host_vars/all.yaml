---

k8s_version: "1.35.6"

kube_api_port: 6443

enable_high_availability: true

# Если enable_high_availability = true, то нужно установить следующие переменные:
vip_address: "10.0.0.10"
vip_prefix: 24
vip_api_port: 7443
haproxy_stats_enabled: true  # Включаем статистику в haproxy
haproxy_balance_algorithm: "source"  # Алгоритм балансировки нагрузки
